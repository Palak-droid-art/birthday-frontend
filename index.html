<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Glass Birthday Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container glass-effect">
        <header>
            <h1>Countdown to the Big Day! 🎂</h1>
            <p>June 30th is coming fast...</p>
        </header>

        <div id="countdown" class="countdown-wrapper">
            <div class="time-box"><span id="days">00</span><p>Days</p></div>
            <div class="time-box"><span id="hours">00</span><p>Hours</p></div>
            <div class="time-box"><span id="minutes">00</span><p>Minutes</p></div>
            <div class="time-box"><span id="seconds">00</span><p>Seconds</p></div>
        </div>

        <div class="controls" style="flex-direction: column; align-items: center; gap: 15px;">
            <button id="color-btn" class="btn">🎨 Change Dark Theme</button>
            <button id="music-btn" class="btn">🎵 Play Music</button>
            <input type="text" id="yt-link" placeholder="Paste YouTube Link here..." class="input-glass" style="width: 250px; padding: 10px;">
            <button id="change-music-btn" class="btn">🔄 Set Song</button>
        </div>
        
        <div id="youtube-player" style="display: none;"></div>

        <div id="image-upload-section">
            <h2>Our Memories 📸</h2>
            <input type="file" id="image-input" accept="image/*" style="display:none;">
            <button id="add-image-btn" class="btn">➕ Add Images</button>
            <div id="image-gallery"></div>
        </div>

        <div id="wishes-section">
            <h2>Birthday Wishes 📝</h2>
            <button id="whatsapp-btn" class="btn" style="background: #25D366;">📱 Share on WhatsApp</button>
            <div class="wish-form">
                <input type="text" id="wish-name" placeholder="Your Name" class="input-glass">
                <textarea id="wish-text" placeholder="Write your special birthday wish here..." rows="3" class="input-glass"></textarea>
                <button id="add-wish-btn" class="btn">✨ Send Wish</button>
            </div>
            <div id="wishes-container"></div>
        </div>
    </div>

    <script>
        document.getElementById('whatsapp-btn').addEventListener('click', function() {
            const siteLink = "https://YOUR-SITE.netlify.app"; 
            const message = "Hey! Himanshi ka birthday aa raha hai. Click here: " + siteLink;
            window.open("https://wa.me/?text=" + encodeURIComponent(message), '_blank');
        });
    </script>
    <script src="script.js"></script> 
</body>
</html>
